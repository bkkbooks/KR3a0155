body:
  text: 析言論析言論謁者僕射季明清達有高才多識前代格言虞世南北堂書鈔卷六十二引張顯高辛氏初生自言其名其君民終無迷謬太平御覽卷八十路史後紀卷九羅蘋注萬雀不及一鳳皇衆星不如一月明歐陽詢藝文類聚卷九十二太平御覽卷九百二十二古諺云堯舜至聖身如脯臘桀紂無道肥膚三尺太平御覽卷三百七十八引張顯析言又卷八十引作鄧析言古今訓土乙力為地陸德明爾雅釋文
